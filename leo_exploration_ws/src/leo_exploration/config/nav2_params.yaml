# ============================================================================
#  Nav2 Parameters — Leo Rover (RPLidar A2M12)
#  ROS2 Jazzy  |  Differential Drive  |  424 × 445 mm footprint
#
#  Robot dimensions from body drawing:
#    Overall: 424 mm (X) x 445 mm (Y) x 303 mm (H)
#    Wheel diameter: 129 mm, width: 65 mm
#    LiDAR secured by mounting pillars (extra padding applied)
#
#  Global planner : NavFn (Dijkstra, allow_unknown=true)
#  Local planner  : Regulated Pure Pursuit (RPP)
#  Costmap layers : ObstacleLayer (2D scan) + InflationLayer
# ============================================================================

# ─────────────────────────────────────────────────────────────────────────────
#  BT Navigator
# ─────────────────────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

# ─────────────────────────────────────────────────────────────────────────────
#  Controller Server  (Regulated Pure Pursuit)
# ─────────────────────────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 3.14159   # exploration doesn't need specific goal orientation

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30         # m/s — conservative for indoor
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 1.57    # only rotate in-place for >90° (was 45°) — reduces SLAM noise
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

# ─────────────────────────────────────────────────────────────────────────────
#  Planner Server  (NavFn — Dijkstra, works in unknown space)
# ─────────────────────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 1.5              # was 0.75 — increased to tolerate minor map artifacts
      use_astar: false        # Dijkstra — more complete in unknown space
      allow_unknown: true     # ← crucial for exploration

# ─────────────────────────────────────────────────────────────────────────────
#  Smoother Server
# ─────────────────────────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ─────────────────────────────────────────────────────────────────────────────
#  Behavior Server  (recovery behaviours)
# ─────────────────────────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ─────────────────────────────────────────────────────────────────────────────
#  Velocity Smoother
# ─────────────────────────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.0, 1.0]
    min_velocity: [-0.30, 0.0, -1.0]
    max_accel: [0.5, 0.0, 3.2]
    max_decel: [-0.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ─────────────────────────────────────────────────────────────────────────────
#  Local Costmap  (rolling 3×3 m window around robot, frame = odom)
# ─────────────────────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Leo Rover polygon footprint (outer dimensions with wheels)
      # 424 mm long × 445 mm wide → half sizes 0.212 × 0.2225 m
      # footprint_padding adds extra margin for LiDAR mounting pillars
      footprint: "[ [0.212, 0.223], [0.212, -0.223], [-0.212, -0.223], [-0.212, 0.223] ]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45    # > robot half-diagonal (0.31 m) + pillar margin

      always_send_full_costmap: true

# ─────────────────────────────────────────────────────────────────────────────
#  Global Costmap  (full map, frame = map)
# ─────────────────────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 2.0        # was 1.0 — faster recovery from map corrections
      publish_frequency: 2.0       # was 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true    # ← keep unknown cells as 255 in costmap
      footprint: "[ [0.212, 0.223], [0.212, -0.223], [-0.212, -0.223], [-0.212, 0.223] ]"
      footprint_padding: 0.03
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

      always_send_full_costmap: true

# ─────────────────────────────────────────────────────────────────────────────
#  Route Server  (new in Nav2 Jazzy — required by navigation_launch.py)
# ─────────────────────────────────────────────────────────────────────────────
route_server:
  ros__parameters:
    use_sim_time: true

# ─────────────────────────────────────────────────────────────────────────────
#  Waypoint Follower
# ─────────────────────────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ─────────────────────────────────────────────────────────────────────────────
#  Collision Monitor  (new in Nav2 Jazzy — required by navigation_launch.py)
# ─────────────────────────────────────────────────────────────────────────────
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.02
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true

# ─────────────────────────────────────────────────────────────────────────────
#  Docking Server  (new in Nav2 Jazzy — required by navigation_launch.py)
# ─────────────────────────────────────────────────────────────────────────────
docking_server:
  ros__parameters:
    use_sim_time: true

# ─────────────────────────────────────────────────────────────────────────────
#  Lifecycle Manager
#  NOTE: navigation_launch.py in Jazzy OVERRIDES node_names with its own
#  hardcoded list. bond_timeout is still read from here.
# ─────────────────────────────────────────────────────────────────────────────
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 20.0
    attempt_respawn_reconnection: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - route_server
      - behavior_server
      - velocity_smoother
      - collision_monitor
      - bt_navigator
      - waypoint_follower
      - docking_server

